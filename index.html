<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everest Hardware - Return Cheque Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; }
        .card { background-color: #161b22; border: 1px solid #30363d; }
        input, select { background-color: #0d1117; border: 1px solid #30363d; color: #e6edf3; }
        input:focus, select:focus { border-color: #58a6ff; outline: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- LOGIN SCREEN -->
    <div id="loginSection" class="flex-1 flex items-center justify-center p-4">
        <div class="w-full max-w-md card rounded-xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-center text-white mb-6">Everest Hardware Secure Login</h2>
            <form id="loginForm" class="space-y-4">
                <input type="text" id="username" class="w-full p-2.5 rounded-lg" placeholder="Username" required>
                <input type="password" id="password" class="w-full p-2.5 rounded-lg" placeholder="Password" required>
                <div id="loginError" class="text-red-400 text-xs hidden">වැරදි පරිශීලක නාමයක් හෝ මුද්‍රාවක් (Password)!</div>
                <button type="submit" class="w-full bg-blue-600 p-2.5 rounded-lg font-medium text-white">Log In</button>
            </form>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboardSection" class="hidden flex-1 flex flex-col">
        <!-- Top Nav -->
        <nav class="bg-[#161b22] border-b border-[#30363d] px-6 py-4 flex justify-between items-center">
            <h1 class="text-lg font-bold text-white">Everest Hardware Co. (Pvt) Ltd.</h1>
            <button id="logoutBtn" class="bg-red-900/40 text-red-400 border border-red-800 px-3 py-1 rounded-lg text-xs">Log Out</button>
        </nav>

        <main class="p-6 max-w-7xl w-full mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Left Side Control Inputs Panel -->
            <div class="space-y-6 lg:col-span-1">
                <!-- Tab Controls Buttons -->
                <div class="card p-1 rounded-xl flex gap-1">
                    <button id="tabNewBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-xs font-medium">New Return</button>
                    <button id="tabPayBtn" class="flex-1 text-gray-400 py-2 rounded-lg text-xs font-medium">Add Payment</button>
                    <button id="tabMasterBtn" class="flex-1 text-gray-400 py-2 rounded-lg text-xs font-medium hidden">Admin Masters</button>
                </div>

                <!-- Form 1: Add New Return Cheque -->
                <div id="formNewBlock" class="card rounded-xl p-5 space-y-4">
                    <h3 class="text-sm font-bold text-blue-400 uppercase tracking-wider">New Return Cheque Entry</h3>
                    <form id="chequeForm" class="space-y-3 text-xs">
                        <div>
                            <label class="block text-gray-400 mb-1">Area Manager</label>
                            <select id="mgrSelect" class="w-full p-2 rounded-lg" required>
                                <option value="">Select Manager</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Sales Representative (Rep)</label>
                            <select id="repSelect" class="w-full p-2 rounded-lg" required>
                                <option value="">-- ප්‍රථමයෙන් Manager තෝරන්න --</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Customer Name</label>
                            <input type="text" id="custName" class="w-full p-2 rounded-lg" required>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="chqNo" class="w-full p-2 rounded-lg" placeholder="Chq No" required>
                            <input type="date" id="chqDate" class="w-full p-2 rounded-lg" required>
                        </div>
                        <input type="number" id="chqAmount" class="w-full p-2 rounded-lg" placeholder="Amount (රු.)" required>
                        <button type="submit" class="w-full bg-blue-600 p-2 rounded-lg font-semibold text-white">Save Cheque</button>
                    </form>
                </div>

                <!-- Form 2: Add Payment -->
                <div id="formPayBlock" class="hidden card rounded-xl p-5 space-y-4">
                    <h3 class="text-sm font-bold text-emerald-400 uppercase tracking-wider">Add Payment</h3>
                    <form id="paymentForm" class="space-y-3 text-xs">
                        <div>
                            <label class="block text-gray-400 mb-1">Select Target Return Cheque</label>
                            <select id="targetChequeSelect" class="w-full p-2 rounded-lg" required></select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">Payment Method</label>
                            <select id="payMethod" class="w-full p-2 rounded-lg" required>
                                <option value="Cash">Cash</option>
                                <option value="Cheque">Replacement Cheque</option>
                            </select>
                        </div>
                        <input type="text" id="payRef" class="w-full p-2 rounded-lg" placeholder="Receipt / Ref No" required>
                        <input type="date" id="payDate" class="w-full p-2 rounded-lg" required>
                        <input type="number" id="payAmount" class="w-full p-2 rounded-lg" placeholder="Received Amount" required>
                        <button type="submit" class="w-full bg-emerald-600 p-2 rounded-lg font-semibold text-white">Update Payment</button>
                    </form>
                </div>

                <!-- Form 3: Admin Master Management Block -->
                <div id="formMasterBlock" class="hidden card rounded-xl p-5 space-y-4 border border-purple-900/40 bg-purple-950/5">
                    <h3 class="text-sm font-bold text-purple-400 uppercase tracking-wider"><i class="fa-solid fa-folder-plus"></i> Add Manager / Rep Master</h3>
                    <div class="space-y-3 text-xs">
                        <div>
                            <label class="block text-gray-400 mb-1">මොකක්ද එකතු කරන්නේ?</label>
                            <select id="masterTypeSelector" class="w-full p-2 rounded-lg">
                                <option value="Manager">New Area Manager (කලාපීය කළමනාකරු)</option>
                                <option value="Rep">New Sales Rep (අලෙවි නියෝජිත)</option>
                            </select>
                        </div>
                        <div id="masterParentBlock" class="hidden">
                            <label class="block text-gray-400 mb-1">මෙම Rep අයිති කාටද? (Select Target Manager)</label>
                            <select id="masterParentManager" class="w-full p-2 rounded-lg"></select>
                        </div>
                        <div>
                            <label class="block text-gray-400 mb-1">නම (Name)</label>
                            <input type="text" id="masterNameInput" class="w-full p-2 rounded-lg" placeholder="Enter Name here...">
                        </div>
                        <button id="saveMasterBtn" type="button" class="w-full bg-purple-600 hover:bg-purple-700 text-white p-2 rounded-lg font-semibold">Save Master Record</button>
                    </div>
                </div>
            </div>

            <!-- Right Side Table View Area -->
            <div class="lg:col-span-2 space-y-4">
                <div class="card p-5 rounded-xl">
                    <h3 class="text-sm font-bold text-gray-300 mb-4">Return Cheques & Balances Registry</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs">
                            <thead>
                                <tr class="bg-gray-800 text-gray-400">
                                    <th class="p-2">Chq No</th>
                                    <th class="p-2">Customer</th>
                                    <th class="p-2">Manager / Rep</th>
                                    <th class="p-2 text-right">Balance</th>
                                </tr>
                            </thead>
                            <tbody id="chequeTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- JS ENGINE LOGIC -->
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyC2fRs3bfw0XHs2bhdkgW5WxVMt5oBzdrA4P15H3pJziwV6J5sASmYo0vFMjjnxNUb/exec"; // <- ඔබගේ Apps Script Web App URL එක මෙතනට දමන්න.
        let currentSession = null;
        let globalCheques = [];
        let globalMasters = [];

        // Tab Event Toggles
        const tabNewBtn = document.getElementById('tabNewBtn');
        const tabPayBtn = document.getElementById('tabPayBtn');
        const tabMasterBtn = document.getElementById('tabMasterBtn');
        const formNewBlock = document.getElementById('formNewBlock');
        const formPayBlock = document.getElementById('formPayBlock');
        const formMasterBlock = document.getElementById('formMasterBlock');

        tabNewBtn.addEventListener('click', () => { setTabActive(formNewBlock, tabNewBtn, 'bg-blue-600'); });
        tabPayBtn.addEventListener('click', () => { setTabActive(formPayBlock, tabPayBtn, 'bg-emerald-600'); });
        tabMasterBtn.addEventListener('click', () => { setTabActive(formMasterBlock, tabMasterBtn, 'bg-purple-600'); });

        function setTabActive(activeBlock, activeTab, activeClass) {
            [formNewBlock, formPayBlock, formMasterBlock].forEach(b => b.classList.add('hidden'));
            [tabNewBtn, tabPayBtn, tabMasterBtn].forEach(t => { 
                t.className = "flex-1 text-gray-400 py-2 rounded-lg text-xs font-medium"; 
            });
            activeBlock.classList.remove('hidden');
            activeTab.className = `flex-1 ${activeClass} text-white py-2 rounded-lg text-xs font-medium`;
        }

        // Master UI Dropdown Toggles
        document.getElementById('masterTypeSelector').addEventListener('change', (e) => {
            const parentBlock = document.getElementById('masterParentBlock');
            if(e.target.value === 'Rep') {
                parentBlock.classList.remove('hidden');
            } else {
                parentBlock.classList.add('hidden');
            }
        });

        // Cascading Dropdown Logic Execution (Manager -> Rep Filtering)
        document.getElementById('mgrSelect').addEventListener('change', (e) => {
            const selectedManager = e.target.value;
            const repSelect = document.getElementById('repSelect');
            repSelect.innerHTML = `<option value="">Select Rep</option>`;
            
            const filteredReps = globalMasters.filter(m => m.type === 'Rep' && m.parent === selectedManager);
            
            if(filteredReps.length === 0) {
                repSelect.innerHTML = `<option value="">-- No Reps Found under this Manager --</option>`;
            } else {
                filteredReps.forEach(rep => {
                    const opt = document.createElement('option');
                    opt.value = rep.value;
                    opt.innerText = rep.value;
                    repSelect.appendChild(opt);
                });
            }
        });

        // Logout Event Logic
        document.getElementById('logoutBtn').addEventListener('click', () => {
            currentSession = null;
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('dashboardSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
            tabMasterBtn.classList.add('hidden');
        });

        // Login System Authentication
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('loginError').classList.add('hidden');
            try {
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({
                    action: "login", username: document.getElementById('username').value.trim(), password: document.getElementById('password').value.trim()
                })});
                const data = await res.json();
                if(data.status === "success") {
                    currentSession = data;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('dashboardSection').classList.remove('hidden');
                    if(data.role === 'admin') tabMasterBtn.classList.remove('hidden');
                    fetchDataEngine();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            } catch (err) {
                alert("API සන්නිවේදන දෝෂයකි: " + err.toString());
            }
        });

        // Load & Fetch Data Engine Data Stream
        async function fetchDataEngine() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                globalCheques = data.cheques || [];
                globalMasters = data.masters || [];
                
                renderChequeTable(globalCheques);
                rebuildMasterDropdownLists(globalMasters);
                rebuildTargetChequeSelect(globalCheques);
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        function rebuildMasterDropdownLists(masters) {
            const mgrSelect = document.getElementById('mgrSelect');
            const adminParentSelect = document.getElementById('masterParentManager');
            
            mgrSelect.innerHTML = `<option value="">Select Manager</option>`;
            adminParentSelect.innerHTML = `<option value="">Select Manager</option>`;
            
            masters.filter(m => m.type === 'Manager').forEach(mgr => {
                const opt1 = document.createElement('option'); opt1.value = mgr.value; opt1.innerText = mgr.value;
                const opt2 = document.createElement('option'); opt2.value = mgr.value; opt2.innerText = mgr.value;
                mgrSelect.appendChild(opt1);
                adminParentSelect.appendChild(opt2);
            });
        }

        function rebuildTargetChequeSelect(cheques) {
            const targetSelect = document.getElementById('targetChequeSelect');
            targetSelect.innerHTML = `<option value="">-- Select Return Cheque --</option>`;
            cheques.forEach(c => {
                if(c.balance > 0) {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.innerText = `Chq: ${c.chq_no} - ${c.customer} (Bal: රු.${c.balance})`;
                    targetSelect.appendChild(opt);
                }
            });
        }

        // Form Submit: Add New Return Cheque
        document.getElementById('chequeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                action: "add_cheque",
                manager_name: document.getElementById('mgrSelect').value,
                rep_name: document.getElementById('repSelect').value,
                return_account: "Return Account",
                customer_name: document.getElementById('custName').value,
                cheque_date: document.getElementById('chqDate').value,
                cheque_no: document.getElementById('chqNo').value,
                amount: document.getElementById('chqAmount').value,
                user: currentSession.username
            };
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            alert(result.message);
            document.getElementById('chequeForm').reset();
            fetchDataEngine();
        });

        // Form Submit: Add Payment Log
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                action: "add_payment",
                cheque_reg_id: document.getElementById('targetChequeSelect').value,
                received_date: document.getElementById('payDate').value,
                payment_method: document.getElementById('payMethod').value,
                ref_no: document.getElementById('payRef').value,
                amount_received: document.getElementById('payAmount').value,
                user: currentSession.username
            };
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            alert(result.message);
            document.getElementById('paymentForm').reset();
            fetchDataEngine();
        });

        // Click Action Click handling for master entries
        document.getElementById('saveMasterBtn').addEventListener('click', async () => {
            const type = document.getElementById('masterTypeSelector').value;
            const value = document.getElementById('masterNameInput').value.trim();
            const parent = document.getElementById('masterParentManager').value;
            
            if(!value) { alert("කරුණාකර නම ඇතුලත් කරන්න!"); return; }
            if(type === 'Rep' && !parent) { alert("කරුණාකර මෙම Rep අයිති මැනේජර්වරයාව තෝරන්න!"); return; }

            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({
                action: "add_master", type: type, value: value, parent_value: type === 'Rep' ? parent : '', role: currentSession.role
            })});
            const result = await res.json();
            alert(result.message);
            document.getElementById('masterNameInput').value = "";
            fetchDataEngine();
        });

        function renderChequeTable(cheques) {
            const body = document.getElementById('chequeTableBody');
            body.innerHTML = "";
            if(cheques.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-gray-500">දත්ත කිසිවක් හමුනොවීය.</td></tr>`;
                return;
            }
            cheques.forEach(c => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-[#30363d] hover:bg-gray-800/30";
                tr.innerHTML = `
                    <td class="p-2 font-mono text-white">${c.chq_no}</td>
                    <td class="p-2">${c.customer}</td>
                    <td class="p-2 text-gray-400">${c.manager} / ${c.rep}</td>
                    <td class="p-2 text-right font-semibold text-emerald-400">රු. ${c.balance.toLocaleString()}</td>
                `;
                body.appendChild(tr);
            });
        }
    </script>
</body>
</html>
